<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Unitakas | Giriş Yap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <img src="https://upload.wikimedia.org/wikipedia/tr/thumb/8/8b/Sinop_%C3%9Cniversitesi_logosu.png/220px-Sinop_%C3%9Cniversitesi_logosu.png" alt="SÜ Logo">
                <h1>UNITAKAS</h1>
                <p>Sinop Üniversitesi Öğrenci Ağı</p>
            </div>
            
            <form action="index.html" method="GET">
                <div class="input-group">
                    <label>Öğrenci Numarası</label>
                    <input type="text" placeholder="xxx@sinop.edu.tr" required>
                </div>
                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">SİSTEME GİRİŞ YAP</button>
            </form>
            
            <div class="login-footer">
                <a href="#">Şifremi Unuttum</a> | <a href="#">Üye Ol</a>
            </div>
        </div>
    </div>

</body>
</html>
